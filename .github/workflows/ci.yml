# ============================================================================
# فحص الجودة على كل Pull Request: بناء mdBook + فحص الروابط الداخليّة المكسورة
# (لا ينشر — النشر في deploy.yml عند الدمج في main)
# ============================================================================
name: فحص الدليل (بناء + روابط)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: جلب المستودع
        uses: actions/checkout@v4

      - name: تثبيت mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: تثبيت الإضافات (mermaid + linkcheck)
        run: |
          cargo install mdbook-mermaid --locked
          cargo install mdbook-linkcheck --locked
          mdbook-mermaid install .

      - name: البناء + فحص الروابط
        run: mdbook build
