# ============================================================================
# فحص الجودة على كل Pull Request:
#   1) بناء mdBook (يلتقط أخطاء البناء/المخطّطات)
#   2) فحص روابط الإخراج المبنيّ بـ lychee (مستقلّ عن إصدار mdBook)
# لا ينشر — النشر في deploy.yml عند الدمج في main.
# ============================================================================
name: فحص الدليل (بناء + روابط)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: جلب المستودع
        uses: actions/checkout@v4

      - name: تثبيت mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: تثبيت mdbook-mermaid + أصوله
        run: |
          cargo install mdbook-mermaid --locked
          mdbook-mermaid install .

      - name: البناء
        run: mdbook build

      - name: فحص الروابط الداخليّة (lychee على الإخراج المبنيّ)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "book/**/*.html"
          fail: true

  # حُرّاس نظام المزامنة: سلامة البيان + منع «الكتم الصامت» للقفل
  sync-guard:
    runs-on: ubuntu-latest
    steps:
      - name: جلب المستودع (بكامل التاريخ)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml

      - name: (د) حارس سلامة البيان (بلا شبكة)
        run: python scripts/check_sync.py --validate

      - name: (أ) حارس القفل — لا تثبيت بصمةٍ دون مراجعة فصلها
        run: |
          BASE="origin/${{ github.base_ref }}"
          git show "$BASE:sync/sources.lock.json" > base.lock.json 2>/dev/null || : > base.lock.json
          git diff --name-only "$BASE"...HEAD > changed.txt
          python scripts/check_sync.py --guard-lock --base base.lock.json --changed-files changed.txt
