# ============================================================================
# فحص مزامنة الدليل مع كود اللغة (drift detection) — مربوطٌ بإصدارات اللغة.
# يقيس الانجراف تجاه **آخر وسم إصدار** للغة (لا تجاه dev المتقلّب)، فتعكس النتيجة
# «هل يطابق الدليلُ الإصدارَ المنشور؟». يعمل: عند إصدار لغة جديد (repository_dispatch
# من مستودع اللغة)، أسبوعيًّا، ويدويًّا. عند الانجراف يفتح/يحدّث قضيّة بالفصول المتأثّرة.
# ============================================================================
name: sync-check

on:
  schedule:
    - cron: "0 6 * * 1"      # كل اثنين 06:00 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: "ref/وسم لقياس الانجراف تجاهه (افتراضيًّا آخر إصدار)"
        required: false
  repository_dispatch:
    types: [language-release]   # يطلقه مستودع اللغة عند نشر إصدار

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml

      - name: تحديد الـref (وسم الإصدار > مُدخَل يدويّ > آخر إصدار > dev)
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF="${{ github.event.client_payload.tag }}"
          [ -z "$REF" ] && REF="${{ github.event.inputs.ref }}"
          if [ -z "$REF" ]; then
            REF=$(gh api repos/sadlang/s-programming-language/releases/latest \
                  --jq .tag_name 2>/dev/null || true)
          fi
          [ -z "$REF" ] && REF="dev"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "نقيس الانجراف تجاه: $REF"

      - name: فحص الانجراف
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python scripts/check_sync.py --ref "${{ steps.ref.outputs.ref }}" --json > report.json
          echo "drift=$?" >> "$GITHUB_OUTPUT"
          cat report.json

      - name: صياغة جسم القضيّة
        if: steps.check.outputs.drift == '1'
        env:
          MEASURED_REF: ${{ steps.ref.outputs.ref }}
        run: |
          python - <<'PY' > body.md
          import json, os
          r = json.load(open("report.json", encoding="utf-8"))
          ref = os.environ["MEASURED_REF"]
          L = [f"رصد فحص المزامنة انجرافًا بين الدليل وكود اللغة عند **`{ref}`** "
               f"(النسخة المُغطّاة في الدليل: `{r.get('covers_version')}`).\n",
               "أي أن مصادر تغيّرت في اللغة وقد لا يطابقها الدليل بعد.\n"]
          def sec(t, items):
              if items:
                  L.append(f"### {t}")
                  L.extend(f"- `{i}`" for i in items)
                  L.append("")
          sec("📝 مصادر تغيّرت", r["changed"])
          sec("➕ مصادر أُضيفت", r["added"])
          sec("➖ مصادر حُذفت/نُقلت", r["removed"])
          sec("❓ مصادر متعذّر الوصول", r["missing"])
          sec("📚 فصول تحتاج مراجعة", r["affected_chapters"])
          L.append("---")
          ver = ref.lstrip("v") if ref != "dev" else ""
          setver = f" --set-version {ver}" if ver else ""
          L.append("**بعد مراجعة الفصول وتعديلها فعليًّا**، ثبّت الحالة (وارفع النسخة "
                   "إن كان إصدارًا):")
          L.append(f"```\npython scripts/check_sync.py --ref {ref}{setver} --update\n```")
          L.append("> ملاحظة: حارس CI يرفض تثبيت القفل دون تعديل الفصل المرتبط فعليًّا.")
          L.append("\n<sub>أُنشئت آليًّا بوساطة workflow `sync-check`.</sub>")
          print("\n".join(L))
          PY

      - name: فتح/تحديث قضيّة الانجراف
        if: steps.check.outputs.drift == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="🔄 انجراف الدليل عن كود اللغة"
          NUM=$(gh issue list --state open --search "$TITLE in:title" \
                --json number --jq '.[0].number')
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file body.md
            gh issue comment "$NUM" --body "أُعيد رصد الانجراف في $(date -u +%F) تجاه \`${{ steps.ref.outputs.ref }}\`."
            echo "حُدِّثت القضيّة #$NUM"
          else
            gh issue create --title "$TITLE" --body-file body.md --label documentation 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file body.md
          fi

      - name: لا انجراف
        if: steps.check.outputs.drift == '0'
        run: echo "✅ الدليل متزامن مع ${{ steps.ref.outputs.ref }}."
